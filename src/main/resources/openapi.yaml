openapi: 3.0.4
info:
  title: Swagger Petstore - OpenAPI 3.0
  description: |-
    This is a sample Pet Store Server based on the OpenAPI 3.0 specification.  You can find out more about
    Swagger at [https://swagger.io](https://swagger.io). In the third iteration of the pet store, we've switched to the design first approach!
    You can now help us improve the API whether it's by making changes to the definition itself or to the code.
    That way, with time, we can improve the API in general, and expose some of the new features in OAS3.

    Some useful links:
    - [The Pet Store repository](https://github.com/swagger-api/swagger-petstore)
    - [The source API definition for the Pet Store](https://github.com/swagger-api/swagger-petstore/blob/master/src/main/resources/openapi.yaml)
  termsOfService: https://swagger.io/terms/
  contact:
    email: apiteam@swagger.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.27
externalDocs:
  description: Find out more about Swagger
  url: https://swagger.io
servers:
  - url: http://localhost:8080/api/v3
tags:
  - name: pet
    description: Everything about your Pets
    externalDocs:
      description: Find out more
      url: https://swagger.io
  - name: store
    description: Access to Petstore orders
    externalDocs:
      description: Find out more about our store
      url: https://swagger.io
  - name: user
    description: Operations about user
  - name: boarding
    description: Pet boarding and kennel management

# Paths are split into domain-specific files:
#   openapi-pet.yaml     — /pet/** endpoints
#   openapi-store.yaml   — /store/** endpoints
#   openapi-user.yaml    — /user/** endpoints
#   openapi-boarding.yaml — /boarding/** endpoints
paths:
  /pet:
    $ref: './openapi-pet.yaml#/paths/~1pet'
  /pet/findByStatus:
    $ref: './openapi-pet.yaml#/paths/~1pet~1findByStatus'
  /pet/findByTags:
    $ref: './openapi-pet.yaml#/paths/~1pet~1findByTags'
  /pet/{petId}:
    $ref: './openapi-pet.yaml#/paths/~1pet~1{petId}'
  /pet/{petId}/uploadImage:
    $ref: './openapi-pet.yaml#/paths/~1pet~1{petId}~1uploadImage'
  /store/inventory:
    $ref: './openapi-store.yaml#/paths/~1store~1inventory'
  /store/order:
    $ref: './openapi-store.yaml#/paths/~1store~1order'
  /store/order/{orderId}:
    $ref: './openapi-store.yaml#/paths/~1store~1order~1{orderId}'
  /user:
    $ref: './openapi-user.yaml#/paths/~1user'
  /user/createWithList:
    $ref: './openapi-user.yaml#/paths/~1user~1createWithList'
  /user/login:
    $ref: './openapi-user.yaml#/paths/~1user~1login'
  /user/logout:
    $ref: './openapi-user.yaml#/paths/~1user~1logout'
  /user/{username}:
    $ref: './openapi-user.yaml#/paths/~1user~1{username}'
  /boarding/kennel:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1kennel'
  /boarding/kennel/available:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1kennel~1available'
  /boarding/kennel/{kennelId}:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1kennel~1{kennelId}'
  /boarding/reservation:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1reservation'
  /boarding/reservation/{reservationId}:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1reservation~1{reservationId}'
  /boarding/reservation/pet/{petId}:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1reservation~1pet~1{petId}'
  /boarding/reservation/owner/{username}:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1reservation~1owner~1{username}'
  /boarding/reservation/{reservationId}/checkin:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1reservation~1{reservationId}~1checkin'
  /boarding/reservation/{reservationId}/checkout:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1reservation~1{reservationId}~1checkout'
  /boarding/reservation/{reservationId}/cancel:
    $ref: './openapi-boarding.yaml#/paths/~1boarding~1reservation~1{reservationId}~1cancel'

components:
  schemas:
    Order:
      x-swagger-router-model: io.swagger.petstore.model.Order
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        petId:
          type: integer
          format: int64
          example: 198772
        quantity:
          type: integer
          format: int32
          example: 7
        shipDate:
          type: string
          format: date-time
        status:
          type: string
          description: Order Status
          example: approved
          enum:
            - placed
            - approved
            - delivered
        complete:
          type: boolean
      xml:
        name: order
    Category:
      x-swagger-router-model: io.swagger.petstore.model.Category
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Dogs
      xml:
        name: category
    User:
      x-swagger-router-model: io.swagger.petstore.model.User
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        username:
          type: string
          example: theUser
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: James
        email:
          type: string
          example: john@email.com
        password:
          type: string
          example: '12345'
        phone:
          type: string
          example: '12345'
        userStatus:
          type: integer
          description: User Status
          format: int32
          example: 1
      xml:
        name: user
    Tag:
      x-swagger-router-model: io.swagger.petstore.model.Tag
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: tag
    Pet:
      x-swagger-router-model: io.swagger.petstore.model.Pet
      required:
        - name
        - photoUrls
        - id
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: doggie
        category:
          $ref: '#/components/schemas/Category'
        photoUrls:
          type: array
          xml:
            wrapped: true
          items:
            type: string
            xml:
              name: photoUrl
        tags:
          type: array
          xml:
            wrapped: true
          items:
            $ref: '#/components/schemas/Tag'
        status:
          type: string
          description: pet status in the store
          enum:
            - available
            - pending
            - sold
      xml:
        name: pet
    Kennel:
      type: object
      required:
        - name
        - size
        - capacity
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 11
        name:
          type: string
          example: Small Suites
        size:
          type: string
          enum:
            - small
            - medium
            - large
          example: small
        capacity:
          type: integer
          format: int32
          minimum: 1
          example: 5
        description:
          type: string
          example: Cozy suites for small dogs and cats
      xml:
        name: kennel
    BoardingReservation:
      type: object
      required:
        - petId
        - kennelId
        - ownerUsername
        - checkInDate
        - checkOutDate
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 501
        petId:
          type: integer
          format: int64
          example: 10
        kennelId:
          type: integer
          format: int64
          example: 11
        ownerUsername:
          type: string
          example: john_doe
        checkInDate:
          type: string
          format: date
          example: '2026-06-01'
        checkOutDate:
          type: string
          format: date
          example: '2026-06-07'
        status:
          type: string
          readOnly: true
          enum:
            - confirmed
            - checked_in
            - checked_out
            - cancelled
          example: confirmed
        specialInstructions:
          type: string
          example: Needs medication twice daily
      xml:
        name: boardingReservation
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
      xml:
        name: '##default'
  requestBodies:
    Pet:
      description: Pet object that needs to be added to the store
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Pet'
        application/xml:
          schema:
            $ref: '#/components/schemas/Pet'
    UserArray:
      description: List of user object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/User'
  securitySchemes:
    petstore_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://petstore3.swagger.io/oauth/authorize
          scopes:
            "write:pets": modify pets in your account
            "read:pets": read your pets
    api_key:
      type: apiKey
      name: api_key
      in: header
