# Pet domain paths
/pet:
  put:
    tags:
      - pet
    summary: Update an existing pet.
    description: Update an existing pet by Id.
    operationId: updatePet
    requestBody:
      description: Update an existent pet in the store
      content:
        application/json:
          schema:
            $ref: './openapi.yaml#/components/schemas/Pet'
        application/xml:
          schema:
            $ref: './openapi.yaml#/components/schemas/Pet'
        application/x-www-form-urlencoded:
          schema:
            $ref: './openapi.yaml#/components/schemas/Pet'
      required: true
    responses:
      '200':
        description: Successful operation
        content:
          application/json:
            schema:
              $ref: './openapi.yaml#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: './openapi.yaml#/components/schemas/Pet'
      '400':
        description: Invalid ID supplied
      '404':
        description: Pet not found
      '422':
        description: Validation exception
      default:
        description: Unexpected error
    security:
      - petstore_auth:
          - write:pets
          - read:pets
  post:
    tags:
      - pet
    summary: Add a new pet to the store.
    description: Add a new pet to the store.
    operationId: addPet
    requestBody:
      description: Create a new pet in the store
      content:
        application/json:
          schema:
            $ref: './openapi.yaml#/components/schemas/Pet'
        application/xml:
          schema:
            $ref: './openapi.yaml#/components/schemas/Pet'
        application/x-www-form-urlencoded:
          schema:
            $ref: './openapi.yaml#/components/schemas/Pet'
      required: true
    responses:
      '200':
        description: Successful operation
        content:
          application/json:
            schema:
              $ref: './openapi.yaml#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: './openapi.yaml#/components/schemas/Pet'
      '400':
        description: Invalid input
      '422':
        description: Validation exception
      default:
        description: Unexpected error
    security:
      - petstore_auth:
          - write:pets
          - read:pets
/pet/findByStatus:
  get:
    tags:
      - pet
    summary: Finds Pets by status.
    description: Multiple status values can be provided with comma separated strings.
    operationId: findPetsByStatus
    parameters:
      - name: status
        in: query
        description: Status values that need to be considered for filter
        required: true
        explode: true
        schema:
          type: string
          default: available
          enum:
            - available
            - pending
            - sold
    responses:
      '200':
        description: successful operation
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: './openapi.yaml#/components/schemas/Pet'
          application/xml:
            schema:
              type: array
              items:
                $ref: './openapi.yaml#/components/schemas/Pet'
      '400':
        description: Invalid status value
      default:
        description: Unexpected error
    security:
      - petstore_auth:
          - write:pets
          - read:pets
/pet/findByTags:
  get:
    tags:
      - pet
    summary: Finds Pets by tags.
    description: Multiple tags can be provided with comma separated strings. Use tag1, tag2, tag3 for testing.
    operationId: findPetsByTags
    parameters:
      - name: tags
        in: query
        description: Tags to filter by
        required: true
        explode: true
        schema:
          type: array
          items:
            type: string
    responses:
      '200':
        description: successful operation
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: './openapi.yaml#/components/schemas/Pet'
          application/xml:
            schema:
              type: array
              items:
                $ref: './openapi.yaml#/components/schemas/Pet'
      '400':
        description: Invalid tag value
      default:
        description: Unexpected error
    security:
      - petstore_auth:
          - write:pets
          - read:pets
/pet/{petId}:
  get:
    tags:
      - pet
    summary: Find pet by ID.
    description: Returns a single pet.
    operationId: getPetById
    parameters:
      - name: petId
        in: path
        description: ID of pet to return
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: successful operation
        content:
          application/json:
            schema:
              $ref: './openapi.yaml#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: './openapi.yaml#/components/schemas/Pet'
      '400':
        description: Invalid ID supplied
      '404':
        description: Pet not found
      default:
        description: Unexpected error
    security:
      - api_key: []
      - petstore_auth:
          - write:pets
          - read:pets
  post:
    tags:
      - pet
    summary: Updates a pet in the store with form data.
    description: Updates a pet resource based on the form data.
    operationId: updatePetWithForm
    parameters:
      - name: petId
        in: path
        description: ID of pet that needs to be updated
        required: true
        schema:
          type: integer
          format: int64
      - name: name
        in: query
        description: Name of pet that needs to be updated
        schema:
          type: string
      - name: status
        in: query
        description: Status of pet that needs to be updated
        schema:
          type: string
    responses:
      '200':
        description: successful operation
        content:
          application/json:
            schema:
              $ref: './openapi.yaml#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: './openapi.yaml#/components/schemas/Pet'
      '400':
        description: Invalid input
      default:
        description: Unexpected error
    security:
      - petstore_auth:
          - write:pets
          - read:pets
  delete:
    tags:
      - pet
    summary: Deletes a pet.
    description: Delete a pet.
    operationId: deletePet
    parameters:
      - name: api_key
        in: header
        required: false
        schema:
          type: string
      - name: petId
        in: path
        description: Pet id to delete
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Pet deleted
      '400':
        description: Invalid pet value
      default:
        description: Unexpected error
    security:
      - petstore_auth:
          - write:pets
          - read:pets
/pet/{petId}/uploadImage:
  post:
    tags:
      - pet
    summary: Uploads an image.
    description: Upload image of the pet.
    operationId: uploadFile
    parameters:
      - name: petId
        in: path
        description: ID of pet to update
        required: true
        schema:
          type: integer
          format: int64
      - name: additionalMetadata
        in: query
        description: Additional Metadata
        required: false
        schema:
          type: string
    requestBody:
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    responses:
      '200':
        description: successful operation
        content:
          application/json:
            schema:
              $ref: './openapi.yaml#/components/schemas/ApiResponse'
      '400':
        description: No file uploaded
      '404':
        description: Pet not found
      default:
        description: Unexpected error
    security:
      - petstore_auth:
          - write:pets
          - read:pets
