name: Deploy and QA Agent Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Deploy to Beta
        run: |
          echo "Deploying to beta environment..."
          # Simulated deploy step
          sleep 5
          echo "Deploy complete."

  trigger-qa-agent:
    runs-on: ubuntu-latest
    needs: deploy-beta
    steps:
      - name: Trigger UI Tests via CloudSmith webhook
        run: |
          WEBHOOK_URL="https://event-ai.us-west-2.api.aws/webhook/generic/b086be6e-d917-4d81-bbdb-8b9414ec5048"
          WEBHOOK_SECRET="XsSavCjpSb3S2FP9rfFebzvx6g5DOgkOrO2oq2WLbgI="
          PAYLOAD='{"eventType":"deployment_completed","testProfileId":"88d92217-af49-43f9-b694-2e0c3c6d05e7","environment":"beta","repository":"${{ github.repository }}","commitSha":"${{ github.sha }}"}'
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" -binary | base64)
          curl -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: ${TIMESTAMP}" \
            -H "x-amzn-event-signature: ${SIGNATURE}" \
            -d "${PAYLOAD}"
          echo "UI Tests triggered."

      - name: Trigger API Tests via CloudSmith webhook
        run: |
          WEBHOOK_URL="https://event-ai.us-west-2.api.aws/webhook/generic/b086be6e-d917-4d81-bbdb-8b9414ec5048"
          WEBHOOK_SECRET="XsSavCjpSb3S2FP9rfFebzvx6g5DOgkOrO2oq2WLbgI="
          PAYLOAD='{"eventType":"deployment_completed","testProfileId":"e17f328c-5f9f-4054-b9bb-57f76f0ed42f","environment":"beta","repository":"${{ github.repository }}","commitSha":"${{ github.sha }}"}'
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" -binary | base64)
          curl -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: ${TIMESTAMP}" \
            -H "x-amzn-event-signature: ${SIGNATURE}" \
            -d "${PAYLOAD}"
          echo "API Tests triggered."
