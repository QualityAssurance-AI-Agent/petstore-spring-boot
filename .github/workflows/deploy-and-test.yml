name: Deploy and QA Agent Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Deploy to Beta
        run: echo "Deployed to beta."

  trigger-qa-agent:
    runs-on: ubuntu-latest
    needs: deploy-beta
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger UI Tests
        run: |
          WEBHOOK_URL="https://event-ai.us-east-1.api.aws/webhook/generic/abe58e7a-7a2a-40bf-a8ee-4c0b067467b7"
          WEBHOOK_SECRET="zR8JBbNEWSzsyCOgvHE9mxCNDkK3v4yLBBippLCeyqo="

          PR_NUMBER=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number // 0')
          CHECK_RUN_ID=$(gh api "/repos/${{ github.repository }}/check-runs" \
            -X POST \
            -f name="devops-agent/qa-ui-testing" \
            -f head_sha="${{ github.sha }}" \
            -f status="in_progress" \
            -f "output[title]=QA UI Testing In Progress" \
            -f "output[summary]=QA Agent is running UI tests..." \
            --jq '.id')

          echo "PR: ${PR_NUMBER}, Check Run: ${CHECK_RUN_ID}"

      - name: Trigger API Tests
        run: |
          WEBHOOK_URL="https://event-ai.us-east-1.api.aws/webhook/generic/abe58e7a-7a2a-40bf-a8ee-4c0b067467b7"
          WEBHOOK_SECRET="zR8JBbNEWSzsyCOgvHE9mxCNDkK3v4yLBBippLCeyqo="

          PR_NUMBER=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number // 0')
          CHECK_RUN_ID=$(gh api "/repos/${{ github.repository }}/check-runs" \
            -X POST \
            -f name="devops-agent/qa-api-testing" \
            -f head_sha="${{ github.sha }}" \
            -f status="in_progress" \
            -f "output[title]=QA API Testing In Progress" \
            -f "output[summary]=QA Agent is running API tests..." \
            --jq '.id')

          echo "PR: ${PR_NUMBER}, Check Run: ${CHECK_RUN_ID}"