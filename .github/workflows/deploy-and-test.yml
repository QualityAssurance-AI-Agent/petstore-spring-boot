name: Deploy and QA Agent Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Deploy to Beta
        run: echo "Deployed to beta."

  trigger-qa-agent:
    runs-on: ubuntu-latest
    needs: deploy-beta
    steps:
      - name: Trigger UI Tests via CloudSmith webhook
        run: |
          WEBHOOK_URL="https://event-ai.us-east-1.api.aws/webhook/generic/abe58e7a-7a2a-40bf-a8ee-4c0b067467b7"
          WEBHOOK_SECRET="zR8JBbNEWSzsyCOgvHE9mxCNDkK3v4yLBBippLCeyqo="
          PAYLOAD='{"eventType":"deployment_completed","testProfileId":"c0941631-eea9-42fa-8c0e-1239013d151e", "testRequirement":"Verify
          the pet store API endpoints return correct responses for CRUD operations", "environment":"beta","repository":"${{ github.repository }}","commitSha":"${{ github.sha }}"}'
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" -binary | base64)
          curl -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: ${TIMESTAMP}" \
            -H "x-amzn-event-signature: ${SIGNATURE}" \
            -d "${PAYLOAD}"
          echo "UI Tests triggered."

      - name: Trigger API Tests via CloudSmith webhook
        run: |
          WEBHOOK_URL="https://event-ai.us-east-1.api.aws/webhook/generic/abe58e7a-7a2a-40bf-a8ee-4c0b067467b7"
          WEBHOOK_SECRET="zR8JBbNEWSzsyCOgvHE9mxCNDkK3v4yLBBippLCeyqo="
          PAYLOAD='{"eventType":"deployment_completed","testProfileId":"6df44493-1851-40e9-b9d1-682c4cab3c6d", "testRequirement":"Verify
          the pet store API endpoints return correct responses for CRUD operations", "environment":"beta","repository":"${{ github.repository }}","commitSha":"${{ github.sha }}"}'
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" -binary | base64)
          curl -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: ${TIMESTAMP}" \
            -H "x-amzn-event-signature: ${SIGNATURE}" \
            -d "${PAYLOAD}"
          echo "API Tests triggered."
