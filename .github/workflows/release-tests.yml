name: Release api test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Beta
        run: echo "Deployed to beta."

  trigger-api-tests:
    runs-on: ubuntu-latest
    needs: deploy-beta
    steps:
      - name: Trigger API Tests
        uses: QualityAssurance-AI-Agent/devops-agent-qa-internal@main
        with:
          webhook-url: ${{ secrets.DEVOPS_AGENT_WEBHOOK_URL }}
          webhook-secret: ${{ secrets.DEVOPS_AGENT_WEBHOOK_SECRET }}
          test-profile-id: ki-a992799a-af8f-4aa7-9d76-f7594e6c7538
          test-requirement: "check one api and stop"
        env:
          GITHUB_TOKEN: ${{ github.token }}
